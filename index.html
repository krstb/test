<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flugverkehr Test</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon-192.png"> 
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta name="theme-color" content="#000000">
    <meta name="color-scheme" content="light">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <script>
      // Service Worker Registrierung
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js')
            .catch(err => console.log('SW Fehler:', err));
        });
      }
    </script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>

/* Fix für PWA-Ränder */
    html {background-color: #000000 !important;overscroll-behavior-y: none;}
        
        /* Setze die Standard-Schriftart */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f7f7f7;
        }
        .container {
            min-height: 100vh;
        }
        /* Definiere einen Lade-Spin-Effekt */
        @keyframes spin {
            from { transform: rotate(0deg);
            }
            to { transform: rotate(360deg);
            }
        }
        .animate-spin-custom {
            animation: spin 1s linear infinite;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary-blue': '#4c78a8', 
     
                        'secondary-gray': '#e5e7eb',
                        'in-air': '#10b981', /* Emerald Green */
                        'on-ground': '#6b7280', /* Gray */
                    }
   
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50">

    <div class="container mx-auto p-4 sm:p-6 max-w-4xl">
        <header class="text-center py-6 bg-primary-blue text-white rounded-xl shadow-lg mb-6">
            <h1 class="text-3xl font-extrabold tracking-tight">Flugzeuge im Großraum Augsburg</h1>
            <p class="text-sm mt-1 opacity-90">Sortiert nach Entfernung vom Zentrum</p>
 
        </header>

        <div id="status-message" class="text-center p-3 mb-4 rounded-lg text-sm font-medium transition duration-300">
            </div>
        
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-semibold text-gray-700">Gefundene Flugobjekte (<span id="count">0</span>)</h2>
            <button id="refresh-button" onclick="fetchAircraftData()" class="bg-primary-blue hover:bg-blue-600 text-white font-bold py-2 px-4 rounded-lg shadow-md transition duration-200 flex items-center">
                <svg id="refresh-icon" class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m15.356-2H15V4m-7 8a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                <span id="refresh-text">Daten aktualisieren</span>
            </button>
        </div>

  
       <ul id="aircraft-list" class="space-y-3">
            </ul>

        <footer class="text-center text-gray-500 text-xs mt-8 p-4">
            <p>Die Daten werden direkt von OpenSky Network abgerufen.
            Sortierung: Entfernung (Nah zuerst).</p>
        </footer>
    </div>

    <script>
        // --- Konfiguration ---
        // Zentrum für den Großraum Augsburg (Postleitzahl 86391 = Neusäß/Augsburg)
        const CENTER_LAT = 48.3800;
        const CENTER_LON = 10.8700; 
        
        // Suchbereich (ca. 150 km Radius)
        const RANGE_DEG = 1.5;
        // Bounding Box Parameter (lamin, lomin, lamax, lomax)
        const LAT_MIN = (CENTER_LAT - RANGE_DEG).toFixed(3);
        const LON_MIN = (CENTER_LON - RANGE_DEG).toFixed(3);
        const LAT_MAX = (CENTER_LAT + REG_DEG = 1.5 ? 1.5 : RANGE_DEG).toFixed(3);
        const LON_MAX = (CENTER_LON + RANGE_DEG).toFixed(3);
        
        const OPENSKY_RAW_PATH = `https://opensky-network.org/api/states/all?lamin=${LAT_MIN}&lomin=${LON_MIN}&lamax=${LAT_MAX}&lomax=${LON_MAX}`;
        
        // Indexpositionen der relevanten Felder in den OpenSky-Arrays
        const INDEX = {
            ICAO24: 0,
            CALLSIGN: 1,
            COUNTRY: 2,
            LAST_CONTACT: 4, // Letzter Kontakt (Unix Time in Sekunden)
            LONGITUDE: 5,
          
            LATITUDE: 6,
            ALTITUDE: 7, // Barometrische Höhe (Meter)
            ON_GROUND: 8, // Am Boden (true/false)
            VELOCITY: 9, // Geschwindigkeit (m/s)
            TRACK: 10, // Flugrichtung (Grad)
        };
        // --- DOM-Elemente und Timer-Management ---
        const listContainer = document.getElementById('aircraft-list');
        const statusMessage = document.getElementById('status-message');
        const refreshButton = document.getElementById('refresh-button');
        const aircraftCount = document.getElementById('count');
        const refreshIcon = document.getElementById('refresh-icon');
        
        let ageUpdateIntervalId = null;
        // --- Geometrie Hilfsfunktionen ---

        /**
         * Konvertiert Grad in Radian.
         */
        function toRad(degrees) {
            return degrees * (Math.PI / 180);
        }

        /**
         * Berechnet die Entfernung zwischen zwei Koordinaten in Kilometern (Haversine-Formel).
         */
        function calculateDistanceKm(lat1, lon1, lat2, lon2) {
            const R = 6371;
            // Radius der Erde in Kilometern
            
            const dLat = toRad(lat2 - lat1);
            const dLon = toRad(lon2 - lon1);
            
            lat1 = toRad(lat1);
            lat2 = toRad(lat2);
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.sin(dLon / 2) * Math.sin(dLon / 2) * Math.cos(lat1) * Math.cos(lat2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)); 
            
            return R * c;
            // Entfernung in Kilometern
        }

        // --- UI Hilfsfunktionen ---

        /**
         * Setzt die Statusmeldung (Lädt, Erfolg, Fehler).
         */
        function setStatus(message, type) {
            statusMessage.textContent = message;
            statusMessage.className = 'text-center p-3 mb-4 rounded-lg text-sm font-medium transition duration-300';
            switch (type) {
                case 'loading':
                    statusMessage.classList.add('bg-blue-100', 'text-blue-700');
                    break;
                case 'success':
                    statusMessage.classList.add('bg-green-100', 'text-green-700');
                    break;
                case 'error':
                    statusMessage.classList.add('bg-red-100', 'text-red-700');
                    break;
                case 'info':
                default:
                    statusMessage.classList.add('bg-yellow-100', 'text-yellow-700');
                    break;
            }
        }

        /**
         * Schaltet den Ladezustand des Buttons um.
         */
        function toggleLoading(isLoading) {
            refreshButton.disabled = isLoading;
            if (isLoading) {
                refreshButton.classList.add('opacity-70', 'cursor-not-allowed');
                refreshIcon.classList.add('animate-spin-custom');
                document.getElementById('refresh-text').textContent = 'Lade Daten...';
            } else {
                refreshButton.classList.remove('opacity-70', 'cursor-not-allowed');
                refreshIcon.classList.remove('animate-spin-custom');
                document.getElementById('refresh-text').textContent = 'Daten aktualisieren';
            }
        }
        
        /**
         * Konvertiert die Differenz in Sekunden in eine lesbare Zeitangabe.
         */
        function formatAge(diffSeconds) {
            const isStale = diffSeconds > 60;
            let text;

            if (diffSeconds < 1) { text = 'Jetzt';
            } 
            else if (diffSeconds < 60) { text = `vor ${diffSeconds} Sek.`;
            } 
            else {
                const minutes = Math.floor(diffSeconds / 60);
                if (minutes < 60) { text = `vor ${minutes} Min.`;
                } 
                else {
                    const hours = Math.floor(minutes / 60);
                    text = `vor ${hours} Std.`;
                }
            }
            return { text, isStale };
        }
        
        /**
         * Startet den 1-Sekunden-Timer zur Aktualisierung der Positionsalter.
         */
        function startRealTimeAgeUpdate() {
            if (ageUpdateIntervalId) {
                clearInterval(ageUpdateIntervalId);
            }

            ageUpdateIntervalId = setInterval(() => {
                const nowUnix = Math.floor(Date.now() / 1000);
                
                document.querySelectorAll('.aircraft-card').forEach(card => {
                    const lastContactTimestamp = parseInt(card.getAttribute('data-timestamp'));
      
                    const ageElement = card.querySelector('.time-display');
                    
                    if (ageElement && !isNaN(lastContactTimestamp) && lastContactTimestamp > 0) {
                        const diffSeconds = nowUnix - lastContactTimestamp;
      
                        const { text, isStale } = formatAge(diffSeconds);

                        ageElement.textContent = text;
                        
                        const timeBox = ageElement.closest('.time-box');
                        if (timeBox) {
                            timeBox.classList.remove('bg-blue-100', 'text-blue-700', 'bg-red-100', 'text-red-700');
                            
              
                            if (isStale) {
                                // Daten sind älter als 60 Sekunden -> Warnung
                                timeBox.classList.add('bg-red-100', 'text-red-700');
                                card.classList.add('opacity-50'); 
                            } else {
                                // Daten sind aktuell
                                timeBox.classList.add('bg-blue-100', 'text-blue-700');
                                card.classList.remove('opacity-50');
                            }
                        }
                    } else if (ageElement) {
                         ageElement.textContent = 'N/A';
                    }
                });
            }, 1000);
        }

        /**
         * Ruft Flugzeugdaten ab, mit erweiterter Proxy-Kette und verlässlicher Fehlerabfangung.
         */
        async function fetchAircraftData() {
            toggleLoading(true);
            listContainer.innerHTML = '';
            aircraftCount.textContent = '...';
            setStatus('Flugdaten für Augsburg werden abgerufen...', 'loading');
            
            // Erweiterte, hochverfügbare CORS-Proxys (inklusive alternativer Dienste)
            const proxies = [
                `https://api.allorigins.win/raw?url=${encodeURIComponent(OPENSKY_RAW_PATH)}`,
                `https://thingproxy.freeboard.io/fetch/${OPENSKY_RAW_PATH}`,
                `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(OPENSKY_RAW_PATH)}`
            ];

            let data = null;
            let successSource = '';

            for (let i = 0; i < proxies.length; i++) {
                try {
                    // cache: 'no-store' verhindert das Laden alter CORS-Fehler aus dem ServiceWorker-Cache
                    const response = await fetch(proxies[i], { cache: 'no-store' });
                    if (!response.ok) continue;

                    const responseText = await response.text();

                    // Explizite Validierung: Beginnt die Antwort mit gültigen JSON-Strukturen?
                    if (!responseText.trim().startsWith('{') && !responseText.trim().startsWith('[')) {
                        console.warn(`Proxy ${i} lieferte kein gültiges JSON.`);
                        continue;
                    }

                    data = JSON.parse(responseText);
                    successSource = `Verbindung ${i + 1}`;
                    break; 
                } catch (e) {
                    console.warn(`Fehler bei Route ${i}:`, e.message);
                }
            }

            if (!data) {
                setStatus('Hinweis: Temporäre API-Überlastung (Rate-Limit/429 von OpenSky). Bitte warten Sie 1–2 Minuten und klicken Sie erneut auf "Daten aktualisieren".', 'info');
                aircraftCount.textContent = 'Bereit';
                toggleLoading(false);
                return;
            }

            let allStates = data.states || [];
            if (allStates.length === 0) {
                setStatus(`Keine Flugobjekte in der Suchzone gefunden.`, 'info');
                aircraftCount.textContent = '0';
                toggleLoading(false);
                return;
            }
            
            processAndRenderData(allStates, successSource);
            toggleLoading(false);
        }
        
        /**
         * Verarbeitet, berechnet die Entfernung, sortiert und rendert die Daten.
         */
        function processAndRenderData(allStates, sourceName) {
            
            // 1. Daten filtern, nur mit gültigen Koordinaten und Entfernung berechnen
            const processedStates = allStates
                .filter(state => state[INDEX.LATITUDE] && state[INDEX.LONGITUDE])
                .map(state => {
  
                    const lat = state[INDEX.LATITUDE];
                    const lon = state[INDEX.LONGITUDE];
                    const distanceKm = calculateDistanceKm(CENTER_LAT, CENTER_LON, lat, lon);
                    
          
                    return {
                        data: state,
                        distanceKm: distanceKm
                    };
                });
            // 2. Sortieren nach Entfernung (Nah zuerst)
            processedStates.sort((a, b) => a.distanceKm - b.distanceKm);
            renderAircraftList(processedStates);
            
            startRealTimeAgeUpdate();
            
            setStatus(`Erfolgreich ${processedStates.length} Flugobjekte geladen (${sourceName}).`, 'success');
            aircraftCount.textContent = processedStates.length;
        }

        /**
         * Rendert die Liste der Flugzeuge im DOM.
         */
        function renderAircraftList(states) {
            listContainer.innerHTML = '';
            states.forEach(processedState => {
                const state = processedState.data;
                const distance = processedState.distanceKm;

                const callsign = state[INDEX.CALLSIGN] ? state[INDEX.CALLSIGN].trim() : 'N/A (Registrierung)';
                const icao24 = state[INDEX.ICAO24];
                const country = state[INDEX.COUNTRY] || 'Unbekannt';
                // Velocity: m/s zu km/h
                const velocity = state[INDEX.VELOCITY] ? (state[INDEX.VELOCITY] * 3.6).toFixed(0) : 'N/A'; 
                // Altitude: Meter zu Fuß
                const altitude = state[INDEX.ALTITUDE] ? (state[INDEX.ALTITUDE] * 3.28084).toFixed(0) : 'N/A'; 
    
                // Track (Flugrichtung)
                const track = state[INDEX.TRACK] ? state[INDEX.TRACK].toFixed(0) + '°' : 'N/A';
                
                const lastContactTime = state[INDEX.LAST_CONTACT];
                
          
                const onGround = state[INDEX.ON_GROUND] || false;
                
                // Status Label und Farbe definieren
                const statusLabel = onGround ? 'Am Boden' : 'In der Luft';
                const statusColor = onGround ? 'text-on-ground bg-gray-100' : 'text-in-air bg-green-100';
                const initialAge = lastContactTime ? formatAge(Math.floor(Date.now() / 1000) - lastContactTime).text : 'N/A';

                const listItem = document.createElement('li');
                listItem.className = 'bg-white p-4 rounded-xl shadow-md border border-gray-200 transition duration-150 hover:shadow-lg aircraft-card';
                // Speichere den Unix-Timestamp im data-Attribut
                listItem.setAttribute('data-timestamp', lastContactTime || '0');
                listItem.innerHTML = `
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center">
                        <div class="mb-2 sm:mb-0">
                            <p class="text-lg font-bold text-primary-blue">${callsign}</p>
               
                            <p class="text-xs text-gray-500">ICAO24: ${icao24} | Herkunft: ${country}</p>
                        </div>
                        
                        <div class="text-right grid grid-cols-2 gap-4 text-sm sm:flex sm:space-x-4">
                    
         
                            <div class="flex flex-col text-center bg-yellow-100 px-2 py-1 rounded-md order-first sm:order-none">
                    
                                <span class="font-bold text-yellow-700">${distance.toFixed(1)} km</span>
                                <span class="text-xs text-yellow-500">Entfernung</span>
                            </div>

                       
                            <div class="flex flex-col text-center ${statusColor} px-2 py-1 rounded-md">
                                <span class="font-semibold">${statusLabel}</span>
                        
                                <span class="text-xs opacity-75">Status</span>
                            </div>
                            
                            <div class="flex flex-col text-center bg-blue-100 px-2 py-1 rounded-md time-box">
                                <span class="font-semibold text-blue-700 time-display">${initialAge}</span>
                                
                                <span class="text-xs text-blue-500">Position vor</span>
                            </div>

                            <div class="flex flex-col text-center bg-secondary-gray px-2 py-1 rounded-md">
                                <span class="font-semibold text-gray-800">${track}</span>
                                <span class="text-xs text-gray-500">Richtung</span>
                            </div>
                            
          
                            <div class="flex flex-col text-center bg-secondary-gray px-2 py-1 rounded-md">
                                <span class="font-semibold text-gray-800">${velocity} km/h</span>
                                <span class="text-xs text-gray-500">Geschw.</span>
      
                            </div>
                            <div class="flex flex-col text-center bg-secondary-gray px-2 py-1 rounded-md">
                                <span class="font-semibold text-gray-800">${altitude} ft</span>
        
                                <span class="text-xs text-gray-500">Höhe</span>
                            </div>
                        </div>
                    </div>
  
                `;
                listContainer.appendChild(listItem);
            });
        }

        // --- Initialisierung ---
        window.onload = function() {
            setStatus(`Initialisiere OpenSky Tracker für den Großraum Augsburg. Sortiert nach Entfernung.`, 'info');
            fetchAircraftData();

            // Setze einen Intervall für die automatische Aktualisierung der Daten (alle 30 Sekunden)
            setInterval(fetchAircraftData, 30000);
            // Starte den 1-Sekunden-Timer für die Zeitanzeige
            startRealTimeAgeUpdate();
        };
</script>
</body>
</html>
